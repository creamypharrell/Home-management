<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Domestic Planner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: hidden; max-width: 100%; }
    body { font-family: Calibri, sans-serif; background: #F8FAFC; }
    a:hover { opacity: 0.8; }
    button { font-family: Calibri, sans-serif; }
    button:hover { filter: brightness(0.95); }

    /* ── Header ── */
    .app-header   { padding: 28px 32px 24px; transition: background 0.2s ease; }
    .header-inner { max-width: 1100px; margin: 0 auto; }
    .header-top   { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .site-title   { font-size: 26px; margin: 0; font-weight: 700; letter-spacing: -0.02em; }
    .dark-btn     { flex-shrink: 0; display: flex; align-items: center; gap: 6px; padding: 8px 16px; min-height: 44px; border-radius: 8px; font-size: 14px; font-weight: 600; white-space: nowrap; cursor: pointer; border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.08); color: white; }
    .progress-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 12px; color: #94A3B8; }
    .progress-bar { height: 6px; border-radius: 3px; overflow: hidden; background: rgba(255,255,255,0.1); }
    .progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #22C55E, #3B82F6); transition: width 0.5s ease; }

    /* ── Body wrapper ── */
    .body-wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }

    /* ── Tabs ── */
    .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; padding: 4px; border-radius: 10px; }
    .tab-btn  { flex: 1; min-width: 0; overflow: hidden; min-height: 44px; padding: 10px 6px; border: none; cursor: pointer; border-radius: 7px; font-size: 13px; font-weight: 600; text-transform: capitalize; transition: all 0.2s ease; position: relative; }

    /* ── Week grid ── */
    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      width: 100%;
    }

    /* ── Day column ── */
    .day-col         { border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
    .day-col-header  { padding: 10px 8px 8px; text-align: center; flex-shrink: 0; }
    .day-name        { font-size: 13px; font-weight: 700; }
    .day-done-count  { font-size: 10px; margin-top: 4px; opacity: 0.75; }

    /* G / E labels row inside each column */
    .ge-labels { display: flex; justify-content: flex-end; gap: 2px; padding: 3px 6px; flex-shrink: 0; }
    .ge-label  { width: 22px; text-align: center; font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }

    /* Task row */
    .day-task-row  { display: flex; align-items: center; gap: 4px; padding: 6px 6px 6px 8px; border-top-width: 1px; border-top-style: solid; }
    .day-task-name { flex: 1; font-size: 11px; font-weight: 500; line-height: 1.3; min-width: 0; word-break: break-word; }
    .day-check-pair { display: flex; gap: 3px; flex-shrink: 0; }

    /* ── Content cards (log / notes) ── */
    .card     { border-radius: 12px; padding: 20px 22px; width: 100%; max-width: 100%; box-sizing: border-box; overflow: hidden; }
    .row-item { display: flex; gap: 12px; padding: 12px 14px; border-radius: 8px; align-items: center; width: 100%; max-width: 100%; box-sizing: border-box; overflow: hidden; }

    /* ── Mobile overrides (≤768px) ── */
    @media (max-width: 768px) {
      .app-header  { padding: 16px; }
      .site-title  { font-size: 20px; }
      .body-wrap   { padding: 14px 12px; }
      .tab-btn     { font-size: 12px; padding: 10px 2px; min-width: 0; overflow: hidden; }
      .dark-btn    { padding: 8px 12px; font-size: 13px; }
      .card        { padding: 14px 16px; overflow: hidden; word-break: break-word; }
      /* Week grid scrolls horizontally on mobile */
      .week-grid {
        grid-template-columns: repeat(7, 120px) !important;
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch !important;
        scrollbar-width: none !important;
        padding-bottom: 6px;
      }
      .week-grid::-webkit-scrollbar { display: none; }
      * { max-width: 100%; box-sizing: border-box; }
    }
  </style>
</head>
<body>
  <style>
    /* Safari iPhone hard reset */
    html { height: -webkit-fill-available; }
    body { min-height: 100vh; min-height: -webkit-fill-available; overflow-x: hidden !important; }
    #root { overflow-x: hidden !important; width: 100vw; max-width: 100%; }
  </style>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── Weekly task schedule ──
    // Each task has a unique ID so completion is tracked per task per day
    const weekSchedule = [
      { day: "Monday",    short: "Mon", tasks: [
        { id: "mon_1", name: "Vacuum all floors" },
        { id: "mon_2", name: "Wipe kitchen benches" },
        { id: "mon_3", name: "Laundry load" },
      ]},
      { day: "Tuesday",   short: "Tue", tasks: [
        { id: "tue_1", name: "Mop hard floors" },
        { id: "tue_2", name: "Fold / put away laundry" },
        { id: "tue_3", name: "Empty bins" },
        { id: "tue_4", name: "Vacuum all floors" },
        { id: "tue_5", name: "Wipe kitchen benches" },
      ]},
      { day: "Wednesday", short: "Wed", tasks: [
        { id: "wed_1", name: "Bathroom clean" },
        { id: "wed_2", name: "Laundry load" },
        { id: "wed_3", name: "Water lawn" },
        { id: "wed_4", name: "Vacuum all floors" },
        { id: "wed_5", name: "Wipe kitchen benches" },
      ]},
      { day: "Thursday",  short: "Thu", tasks: [
        { id: "thu_1", name: "Dust surfaces" },
        { id: "thu_2", name: "Clean microwave" },
        { id: "thu_3", name: "Wipe stovetop" },
        { id: "thu_4", name: "Water garden beds" },
        { id: "thu_5", name: "Vacuum all floors" },
        { id: "thu_6", name: "Wipe kitchen benches" },
      ]},
      { day: "Friday",    short: "Fri", tasks: [
        { id: "fri_1", name: "Grocery shopping" },
        { id: "fri_2", name: "Restock supplies" },
        { id: "fri_3", name: "Wash bed linen" },
        { id: "fri_4", name: "Vacuum all floors" },
        { id: "fri_5", name: "Wipe kitchen benches" },
      ]},
      { day: "Saturday",  short: "Sat", tasks: [
        { id: "sat_1", name: "Mow / edge lawn" },
        { id: "sat_2", name: "Sweep outdoor areas" },
        { id: "sat_3", name: "Wipe fridge exterior" },
        { id: "sat_4", name: "Water garden beds" },
        { id: "sat_5", name: "Vacuum all floors" },
        { id: "sat_6", name: "Wipe kitchen benches" },
      ]},
      { day: "Sunday",    short: "Sun", tasks: [
        { id: "sun_1", name: "Water lawn" },
        { id: "sun_2", name: "Review home management" },
        { id: "sun_3", name: "Flexible / catch-up" },
        { id: "sun_4", name: "Vacuum all floors" },
        { id: "sun_5", name: "Wipe kitchen benches" },
      ]},
    ];

    // ── Perth seasonal context ──
    const seasonInfo = {
      summer: { label: "Summer", icon: "☀️", tip: "↑ Lawn mowing; early morning watering; ↑ dust cleaning" },
      autumn: { label: "Autumn", icon: "🍂", tip: "Wind increases debris; gutter check before end of season" },
      winter: { label: "Winter", icon: "🌧️", tip: "↓ Lawn mowing; ↑ indoor cleaning; check for mould" },
      spring: { label: "Spring", icon: "🌸", tip: "Resume lawn schedule; weed surge; pest check" },
    };

    function getSeason() {
      const m = new Date().getMonth() + 1;
      if (m === 12 || m <= 2) return "summer";
      if (m <= 5) return "autumn";
      if (m <= 8) return "winter";
      return "spring";
    }

    function getTodayName() {
      return new Date().toLocaleDateString("en-AU", { weekday: "long" });
    }

    // A task is done if either person has checked it
    function isDone(completed, id) {
      return completed[id] === "graeme" || completed[id] === "emily";
    }

    // ── Per-person checkbox ──
    // greyed = the other person has checked this task — locked out
    const PersonCheck = ({ checked, greyed, onClick, accent, dark }) => {
      const base = dark ? "#334155" : "#E5E7EB";
      if (greyed) {
        return (
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
            style={{ cursor: "not-allowed", opacity: 0.3, display: "block", flexShrink: 0 }}>
            <circle cx="10" cy="10" r="10" fill={base} />
          </svg>
        );
      }
      return (
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
          onClick={onClick}
          style={{ cursor: "pointer", display: "block", flexShrink: 0, transition: "opacity 0.15s" }}>
          <circle cx="10" cy="10" r="10" fill={checked ? accent : base} />
          {checked && <path d="M5.5 10.5L8.5 13.5L14.5 7.5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />}
        </svg>
      );
    };

    function App() {
      const [activeTab, setActiveTab] = useState("week");

      // completed[taskId] = "graeme" | "emily" | null
      const [completed, setCompleted] = useState(() => {
        try { return JSON.parse(localStorage.getItem("dp_completed") || "{}"); } catch { return {}; }
      });
      const [log, setLog] = useState(() => {
        try { return JSON.parse(localStorage.getItem("dp_log") || "[]"); } catch { return []; }
      });
      const [notes, setNotes] = useState(() => {
        try { return localStorage.getItem("dp_notes_general") || ""; } catch { return ""; }
      });
      const [darkMode, setDarkMode] = useState(() => {
        try { return localStorage.getItem("dp_dark") === "true"; } catch { return false; }
      });
      const [logInput, setLogInput] = useState({ task: "", action: "", outcome: "" });

      useEffect(() => { localStorage.setItem("dp_completed",    JSON.stringify(completed)); }, [completed]);
      useEffect(() => { localStorage.setItem("dp_log",          JSON.stringify(log));       }, [log]);
      useEffect(() => { localStorage.setItem("dp_notes_general", notes);                    }, [notes]);
      useEffect(() => { localStorage.setItem("dp_dark",          darkMode);                 }, [darkMode]);

      // Clicking your own checked box unchecks; clicking when other person owns it → no-op
      const toggleComplete = (id, person) => {
        setCompleted(prev => {
          const cur = prev[id];
          if (cur === person) return { ...prev, [id]: null };
          if (cur && cur !== person) return prev;
          return { ...prev, [id]: person };
        });
      };

      const addLogEntry = () => {
        if (!logInput.task.trim()) return;
        const entry = {
          id: Date.now(),
          date: new Date().toLocaleDateString("en-AU", { year: "numeric", month: "2-digit", day: "2-digit" }),
          ...logInput,
        };
        setLog(prev => [entry, ...prev]);
        setLogInput({ task: "", action: "", outcome: "" });
      };

      const season    = getSeason();
      const todayName = getTodayName();
      const allTasks  = weekSchedule.flatMap(d => d.tasks);
      const totalDone = allTasks.filter(tk => isDone(completed, tk.id)).length;
      const progress  = Math.round((totalDone / allTasks.length) * 100);
      const todayObj  = weekSchedule.find(d => d.day === todayName);
      const todayDone = todayObj ? todayObj.tasks.filter(tk => isDone(completed, tk.id)).length : 0;
      const todayTotal = todayObj ? todayObj.tasks.length : 0;

      const dk = darkMode;
      const ACCENT = "#3B82F6";
      const t = {
        pageBg:      dk ? "#0F172A" : "#F8FAFC",
        header:      dk ? "#080D14" : "#1E293B",
        card:        dk ? "#1E293B" : "white",
        cardShadow:  dk ? "0 1px 3px rgba(0,0,0,0.4)" : "0 1px 3px rgba(0,0,0,0.06)",
        colBg:       dk ? "#1E293B" : "white",
        colHeader:   dk ? "#334155" : "#F1F5F9",
        border:      dk ? "#334155" : "#E5E7EB",
        text:        dk ? "#E2E8F0" : "#1E293B",
        textMuted:   dk ? "#CBD5E1" : "#374151",
        textMuted2:  dk ? "#94A3B8" : "#4B5563",
        label:       dk ? "#64748B" : "#9CA3AF",
        tabInactive: dk ? "#94A3B8" : "#6B7280",
        rowBg:       dk ? "#0F172A" : "#F8FAFC",
        doneBg:      dk ? "#052e16" : "#F0FDF4",
        doneBorder:  dk ? "#166534" : "#BBF7D0",
        doneText:    dk ? "#4ade80" : "#166534",
      };

      return (
        <div style={{ minHeight: "100vh", width: "100%", maxWidth: "100%", overflowX: "hidden", background: t.pageBg, color: t.text, transition: "background 0.2s ease, color 0.2s ease" }}>

          {/* ── Header ── */}
          <div className="app-header" style={{ background: t.header, color: "white" }}>
            <div className="header-inner">
              <div className="header-top">
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontSize: 11, letterSpacing: "0.15em", textTransform: "uppercase", color: "#94A3B8", marginBottom: 4 }}>Perth, Western Australia</div>
                  <h1 className="site-title">Domestic Planner</h1>
                  <p style={{ marginTop: 4, fontSize: 13, color: "#94A3B8" }}>
                    {seasonInfo[season].icon} {seasonInfo[season].label} · {todayName} · Today: {todayDone}/{todayTotal} done
                  </p>
                </div>
                <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                  <a href="dashboard.html" style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 16px", minHeight: 44, borderRadius: 8, fontSize: 14, fontWeight: 600, whiteSpace: "nowrap", border: "1px solid rgba(255,255,255,0.18)", background: "rgba(255,255,255,0.08)", color: "white", textDecoration: "none" }}>
                    Dashboard →
                  </a>
                  <button className="dark-btn" onClick={() => setDarkMode(d => !d)}>
                    {dk ? "☀ Light" : "☾ Dark"}
                  </button>
                </div>
              </div>
              <div className="progress-row">
                <span>This week: {totalDone} of {allTasks.length} tasks done</span>
                <span>{progress}%</span>
              </div>
              <div className="progress-bar">
                <div className="progress-fill" style={{ width: `${progress}%` }} />
              </div>
            </div>
          </div>

          {/* ── Body ── */}
          <div className="body-wrap" style={{ background: t.pageBg }}>

            {/* Tab bar */}
            <div className="tab-bar" style={{ background: t.card, boxShadow: t.cardShadow }}>
              {["week", "log", "notes"].map(tab => (
                <button key={tab} className="tab-btn" onClick={() => setActiveTab(tab)}
                  style={{ background: activeTab === tab ? ACCENT : "transparent", color: activeTab === tab ? "white" : t.tabInactive }}>
                  {tab}
                  {tab === "log" && log.length > 0 && activeTab !== "log" && (
                    <span style={{ position: "absolute", top: 7, right: 7, width: 6, height: 6, borderRadius: "50%", background: ACCENT }} />
                  )}
                  {tab === "notes" && notes && activeTab !== "notes" && (
                    <span style={{ position: "absolute", top: 7, right: 7, width: 6, height: 6, borderRadius: "50%", background: ACCENT }} />
                  )}
                </button>
              ))}
            </div>

            {/* ── Week tab: 7-column day grid ── */}
            {activeTab === "week" && (
              <div className="week-grid">
                {weekSchedule.map(dayObj => {
                  const isToday   = dayObj.day === todayName;
                  const doneCt    = dayObj.tasks.filter(tk => isDone(completed, tk.id)).length;
                  const colAccent = isToday ? ACCENT : (dk ? "#475569" : "#64748B");

                  return (
                    <div key={dayObj.day} className="day-col"
                      style={{
                        background: t.colBg,
                        boxShadow: isToday ? `0 0 0 2px ${ACCENT}` : t.cardShadow,
                      }}>

                      {/* Day header */}
                      <div className="day-col-header"
                        style={{ background: isToday ? ACCENT : t.colHeader }}>
                        <div className="day-name"
                          style={{ color: isToday ? "white" : t.textMuted }}>
                          {dayObj.short}
                        </div>
                        {isToday && (
                          <div style={{ fontSize: 9, color: "rgba(255,255,255,0.85)", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginTop: 2 }}>
                            Today
                          </div>
                        )}
                        <div className="day-done-count"
                          style={{ color: isToday ? "rgba(255,255,255,0.75)" : t.label }}>
                          {doneCt}/{dayObj.tasks.length}
                        </div>
                      </div>

                      {/* G / E column labels */}
                      <div className="ge-labels"
                        style={{ color: t.label, background: t.colBg, borderBottom: `1px solid ${t.border}` }}>
                        <span className="ge-label">G</span>
                        <span className="ge-label">E</span>
                      </div>

                      {/* Task rows */}
                      {dayObj.tasks.map(task => {
                        const who  = completed[task.id];
                        const done = isDone(completed, task.id);
                        return (
                          <div key={task.id} className="day-task-row"
                            style={{
                              background:    done ? t.doneBg : "transparent",
                              borderTopColor: done ? t.doneBorder : t.border,
                            }}>
                            <div className="day-task-name"
                              style={{ color: done ? t.doneText : t.text }}>
                              {task.name}
                            </div>
                            <div className="day-check-pair">
                              <PersonCheck
                                checked={who === "graeme"}
                                greyed={who === "emily"}
                                onClick={() => toggleComplete(task.id, "graeme")}
                                accent={colAccent}
                                dark={dk}
                              />
                              <PersonCheck
                                checked={who === "emily"}
                                greyed={who === "graeme"}
                                onClick={() => toggleComplete(task.id, "emily")}
                                accent={colAccent}
                                dark={dk}
                              />
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            )}

            {/* ── Log tab ── */}
            {activeTab === "log" && (
              <div style={{ display: "grid", gap: 12 }}>
                <div className="card" style={{ background: t.card, boxShadow: t.cardShadow }}>
                  <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: t.label, marginBottom: 14 }}>Add Log Entry</div>
                  <div style={{ display: "grid", gap: 10 }}>
                    <input value={logInput.task} onChange={e => setLogInput(p => ({ ...p, task: e.target.value }))} placeholder="Task name"
                      style={{ width: "100%", padding: "10px 12px", borderRadius: 8, border: `1px solid ${t.border}`, fontSize: 14, fontFamily: "Calibri, sans-serif", color: t.text, background: t.rowBg, outline: "none", boxSizing: "border-box" }} />
                    <input value={logInput.action} onChange={e => setLogInput(p => ({ ...p, action: e.target.value }))} placeholder="What was done?"
                      style={{ width: "100%", padding: "10px 12px", borderRadius: 8, border: `1px solid ${t.border}`, fontSize: 14, fontFamily: "Calibri, sans-serif", color: t.text, background: t.rowBg, outline: "none", boxSizing: "border-box" }} />
                    <input value={logInput.outcome} onChange={e => setLogInput(p => ({ ...p, outcome: e.target.value }))} placeholder="Outcome / notes"
                      style={{ width: "100%", padding: "10px 12px", borderRadius: 8, border: `1px solid ${t.border}`, fontSize: 14, fontFamily: "Calibri, sans-serif", color: t.text, background: t.rowBg, outline: "none", boxSizing: "border-box" }} />
                    <button onClick={addLogEntry}
                      style={{ padding: "12px", borderRadius: 8, border: "none", background: ACCENT, color: "white", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "Calibri, sans-serif" }}>
                      + Add Entry
                    </button>
                  </div>
                </div>

                {log.length === 0 ? (
                  <div className="card" style={{ background: t.card, boxShadow: t.cardShadow, textAlign: "center", color: t.label, fontSize: 14, padding: 32 }}>
                    No log entries yet. Add your first one above.
                  </div>
                ) : (
                  <div className="card" style={{ background: t.card, boxShadow: t.cardShadow }}>
                    <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: t.label, marginBottom: 14 }}>
                      History ({log.length} {log.length === 1 ? "entry" : "entries"})
                    </div>
                    <div style={{ display: "grid", gap: 10 }}>
                      {log.map(entry => (
                        <div key={entry.id} className="row-item"
                          style={{ background: t.rowBg, border: `1px solid ${t.border}`, flexDirection: "column", gap: 4, alignItems: "flex-start" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", width: "100%" }}>
                            <span style={{ fontSize: 13, fontWeight: 700, color: t.text }}>{entry.task}</span>
                            <span style={{ fontSize: 11, color: t.label }}>{entry.date}</span>
                          </div>
                          {entry.action  && <div style={{ fontSize: 12, color: t.textMuted2 }}>Action: {entry.action}</div>}
                          {entry.outcome && <div style={{ fontSize: 12, color: t.textMuted2 }}>Outcome: {entry.outcome}</div>}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ── Notes tab ── */}
            {activeTab === "notes" && (
              <div className="card" style={{ background: t.card, boxShadow: t.cardShadow }}>
                <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: t.label, marginBottom: 14 }}>Notes</div>
                <textarea
                  value={notes}
                  onChange={e => setNotes(e.target.value)}
                  placeholder="Write anything useful — products you use, issues noticed, routines that work..."
                  style={{ width: "100%", minHeight: 200, padding: "14px 16px", borderRadius: 8, border: `1px solid ${t.border}`, fontSize: 15, lineHeight: 1.7, fontFamily: "Calibri, sans-serif", color: t.textMuted, background: t.rowBg, resize: "vertical", outline: "none", boxSizing: "border-box" }}
                  onFocus={e => e.target.style.borderColor = ACCENT}
                  onBlur={e => e.target.style.borderColor = t.border}
                />
                {notes && (
                  <div style={{ marginTop: 8, fontSize: 12, color: t.label, textAlign: "right" }}>
                    {notes.length} characters · saved automatically
                  </div>
                )}
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
