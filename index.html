<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domestic Planner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; }
    body { max-width: 100%; font-family: Calibri, sans-serif; background: #F8FAFC; }
    a:hover { opacity: 0.8; }
    button { font-family: Calibri, sans-serif; }
    button:hover { filter: brightness(0.95); }

    /* ── Header ── */
    .app-header   { padding: 28px 32px 24px; transition: background 0.2s ease; }
    .header-inner { max-width: 960px; margin: 0 auto; }
    .header-top   { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .site-title   { font-size: 26px; margin: 0; font-weight: 700; letter-spacing: -0.02em; }
    .dark-btn     { flex-shrink: 0; display: flex; align-items: center; gap: 6px; padding: 8px 16px; min-height: 44px; border-radius: 8px; font-size: 14px; font-weight: 600; white-space: nowrap; cursor: pointer; border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.08); color: white; }
    .progress-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 12px; color: #94A3B8; }
    .progress-bar { height: 6px; border-radius: 3px; overflow: hidden; background: rgba(255,255,255,0.1); }
    .progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #22C55E, #3B82F6); transition: width 0.5s ease; }

    /* ── Body grid ── */
    .body-grid  { max-width: 960px; margin: 0 auto; padding: 28px 24px; display: grid; grid-template-columns: 220px 1fr; gap: 24px; }
    .sidebar    { position: sticky; top: 20px; align-self: start; }
    .main-col   { min-width: 0; }

    /* ── Sidebar desktop buttons ── */
    .sidebar-btn { width: 100%; text-align: left; border: none; cursor: pointer; padding: 12px 14px; border-radius: 10px; margin-bottom: 6px; transition: all 0.2s ease; display: block; }

    /* ── Sidebar mobile pill strip ── */
    .step-pill  { flex-shrink: 0; width: 100px; text-align: left; border: none; cursor: pointer; padding: 10px; border-radius: 10px; transition: all 0.2s ease; }

    /* ── Category hero card ── */
    .step-hero   { border-radius: 14px; padding: 20px 22px; margin-bottom: 14px; height: auto; overflow: visible; width: 100%; box-sizing: border-box; }

    /* ── Tabs ── */
    .tab-bar { display: flex; gap: 4px; margin-bottom: 14px; padding: 4px; border-radius: 10px; }
    .tab-btn  { flex: 1; min-height: 44px; padding: 10px 6px; border: none; cursor: pointer; border-radius: 7px; font-size: 13px; font-weight: 600; text-transform: capitalize; transition: all 0.2s ease; position: relative; }

    /* ── Content cards ── */
    .card     { border-radius: 12px; padding: 20px 22px; }
    .row-item { display: flex; gap: 12px; padding: 12px 14px; border-radius: 8px; align-items: center; }

    /* ── Sidebar layout switching ── */
    .step-strip   { display: none; }
    .sidebar-list { display: block; }

    /* ── Mobile overrides (≤768px) ── */
    @media (max-width: 768px) {
      .step-strip   { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 8px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
      .step-strip::-webkit-scrollbar { display: none; }
      .sidebar-list { display: none; }
      .app-header  { padding: 16px; }
      .site-title  { font-size: 20px; }
      .body-grid   { grid-template-columns: 1fr; padding: 16px 12px; gap: 14px; }
      .sidebar     { position: static; top: auto; }
      .step-hero   { padding: 14px 16px; }
      .card        { padding: 14px 16px; }
      .tab-btn     { font-size: 12px; padding: 10px 2px; }
      .dark-btn    { padding: 8px 12px; font-size: 13px; }
      .person-col  { width: 52px !important; }
      .person-label { font-size: 10px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── All household tasks from home_management.md ──
    const categories = [
      {
        id: "cleaning", title: "Cleaning", icon: "🧹",
        color: "#EFF6FF", accent: "#3B82F6",
        tasks: [
          { id: "c1",  name: "Vacuum all floors",            freq: "Daily",       notes: "Focus on high-traffic areas; do before mopping" },
          { id: "c2",  name: "Mop hard floors",              freq: "Weekly",      notes: "After vacuuming; use appropriate cleaner per floor" },
          { id: "c3",  name: "Wipe kitchen benches",         freq: "Daily",       notes: "After cooking; prevents grease and ant attraction" },
          { id: "c4",  name: "Clean stovetop",               freq: "Weekly",      notes: "Grease builds quickly in Perth heat" },
          { id: "c5",  name: "Clean oven interior",          freq: "Monthly",     notes: "Log product used and soak time" },
          { id: "c6",  name: "Clean microwave",              freq: "Weekly",      notes: "Wipe interior and exterior" },
          { id: "c7",  name: "Clean bathroom sink/mirror",   freq: "Weekly",      notes: "Limescale common due to Perth hard water" },
          { id: "c8",  name: "Scrub toilet",                 freq: "Weekly",      notes: "Inside bowl and exterior" },
          { id: "c9",  name: "Scrub shower/bath",            freq: "Weekly",      notes: "Perth hard water causes quick soap scum buildup" },
          { id: "c10", name: "Dust surfaces and shelves",    freq: "Weekly",      notes: "Perth dust is significant — check fans and blinds" },
          { id: "c11", name: "Clean ceiling fans",           freq: "Monthly",     notes: "Dust accumulates rapidly; affects air quality" },
          { id: "c12", name: "Wipe windowsills",             freq: "Fortnightly", notes: "Inside and outside if accessible" },
          { id: "c13", name: "Wash windows",                 freq: "Quarterly",   notes: "Interior priority; exterior after rain or dust" },
          { id: "c14", name: "Clean light switches/handles", freq: "Monthly",     notes: "High-touch surfaces; hygiene important" },
        ]
      },
      {
        id: "laundry", title: "Laundry", icon: "👕",
        color: "#F5F3FF", accent: "#8B5CF6",
        tasks: [
          { id: "l1", name: "Wash clothes",        freq: "2–3x/week", notes: "Sort by colour/fabric; log any stain treatment" },
          { id: "l2", name: "Hang/dry clothes",    freq: "Same day",  notes: "Perth sun is ideal for drying; avoid midday peak" },
          { id: "l3", name: "Fold and put away",   freq: "Same day",  notes: "Don't let it pile up — leads to missed items" },
          { id: "l4", name: "Wash bed linen",      freq: "Weekly",    notes: "Fitted sheet, pillowcases; log date" },
          { id: "l5", name: "Wash towels",         freq: "Weekly",    notes: "Hang to air-dry between uses" },
          { id: "l6", name: "Wash doona/blankets", freq: "Monthly",   notes: "Check care labels; sunny days ideal for Perth" },
        ]
      },
      {
        id: "kitchen", title: "Kitchen", icon: "🍽️",
        color: "#FFF7ED", accent: "#F97316",
        tasks: [
          { id: "k1", name: "Wash dishes / run dishwasher", freq: "Daily",     notes: "Don't leave overnight — attracts pests" },
          { id: "k2", name: "Empty dishwasher",             freq: "Daily",     notes: "Do in morning to keep sink clear" },
          { id: "k3", name: "Wipe down fridge exterior",    freq: "Weekly",    notes: "Check handle and top for dust" },
          { id: "k4", name: "Clean fridge interior",        freq: "Monthly",   notes: "Remove expired items; wipe shelves" },
          { id: "k5", name: "Take out rubbish",             freq: "2–3x/week", notes: "Check bin day schedule; note council collection" },
          { id: "k6", name: "Wipe pantry shelves",          freq: "Monthly",   notes: "Check for expired items and pests" },
          { id: "k7", name: "Descale kettle",               freq: "Monthly",   notes: "Perth hard water causes rapid scale buildup" },
        ]
      },
      {
        id: "garden", title: "Garden", icon: "🌿",
        color: "#F0FDF4", accent: "#22C55E",
        tasks: [
          { id: "g1", name: "Mow Kikuyu lawn",           freq: "Weekly (summer) / Fortnightly (winter)", notes: "Kikuyu grows aggressively in summer; log height cut" },
          { id: "g2", name: "Edge lawn",                  freq: "Same as mow",          notes: "Keep borders clean; Kikuyu spreads into garden beds" },
          { id: "g3", name: "Water lawn",                 freq: "Per council schedule", notes: "Check Perth council watering restrictions" },
          { id: "g4", name: "Water garden beds",          freq: "Per council schedule", notes: "Adjust for season; garden plants need more than Kikuyu" },
          { id: "g5", name: "Weed garden beds",           freq: "Fortnightly",          notes: "Kikuyu runners invade beds; pull early" },
          { id: "g6", name: "Sweep patio/outdoor areas",  freq: "Weekly",               notes: "Leaves and dust accumulate quickly in Perth wind" },
          { id: "g7", name: "Clean outdoor furniture",    freq: "Monthly",              notes: "UV and dust damage; cover when not in use" },
          { id: "g8", name: "Check and clean gutters",    freq: "Quarterly",            notes: "Especially before and after summer storms" },
        ]
      },
      {
        id: "admin", title: "Admin", icon: "📋",
        color: "#FFF1F2", accent: "#F43F5E",
        tasks: [
          { id: "a1", name: "Grocery shopping",            freq: "Weekly",  notes: "Maintain a running list; note substitutes" },
          { id: "a2", name: "Check and restock supplies",  freq: "Weekly",  notes: "Cleaning products, paper goods, pantry staples" },
          { id: "a3", name: "Pay household bills",         freq: "Monthly", notes: "Log due dates; set reminders" },
          { id: "a4", name: "Review home management file", freq: "Monthly", notes: "Update tasks and log; propose changes" },
        ]
      },
    ];

    // ── Weekly schedule ──
    const weeklySchedule = [
      { day: "Monday",    tasks: ["Vacuum all floors", "Laundry load", "Wipe kitchen benches"] },
      { day: "Tuesday",   tasks: ["Mop floors", "Fold/put away laundry", "Empty bins"] },
      { day: "Wednesday", tasks: ["Bathroom clean (sink, toilet, shower)", "Laundry load"] },
      { day: "Thursday",  tasks: ["Dust surfaces", "Clean microwave", "Wipe stovetop"] },
      { day: "Friday",    tasks: ["Grocery shopping", "Restock supplies", "Wash bed linen"] },
      { day: "Saturday",  tasks: ["Mow/edge lawn", "Sweep outdoor areas", "Fridge wipe"] },
      { day: "Sunday",    tasks: ["Flexible / catch-up / rest — review what was missed this week"] },
    ];

    // ── Perth seasonal context ──
    const seasonInfo = {
      summer: { label: "Summer", months: "Dec–Feb", icon: "☀️", tip: "↑ Lawn mowing frequency; early morning watering only; ↑ dust cleaning; check fans" },
      autumn: { label: "Autumn", months: "Mar–May", icon: "🍂", tip: "Wind increases leaf/debris; gutter check before end of season" },
      winter: { label: "Winter", months: "Jun–Aug", icon: "🌧️", tip: "↓ Lawn mowing; ↑ indoor cleaning focus; check for mould in bathrooms" },
      spring: { label: "Spring", months: "Sep–Nov", icon: "🌸", tip: "Resume lawn schedule; weed surge in beds; pest check (ants, spiders)" },
    };

    function getSeason() {
      const m = new Date().getMonth() + 1;
      if (m === 12 || m <= 2) return "summer";
      if (m <= 5) return "autumn";
      if (m <= 8) return "winter";
      return "spring";
    }

    function getTodayName() {
      return new Date().toLocaleDateString("en-AU", { weekday: "long" });
    }

    // ── A task is "done" if either person has checked it ──
    function isDone(completed, id) {
      return completed[id] === "graeme" || completed[id] === "emily";
    }

    // ── Frequency badge colours ──
    const freqColors = {
      "Daily":                { bg: "#FEF3C7", text: "#92400E" },
      "Weekly":               { bg: "#EFF6FF", text: "#1D4ED8" },
      "Fortnightly":          { bg: "#F0FDF4", text: "#15803D" },
      "Monthly":              { bg: "#F5F3FF", text: "#6D28D9" },
      "Quarterly":            { bg: "#FFF1F2", text: "#BE123C" },
      "2–3x/week":            { bg: "#FFF7ED", text: "#C2410C" },
      "Same day":             { bg: "#FEF9C3", text: "#92400E" },
      "Same as mow":          { bg: "#F0FDF4", text: "#15803D" },
      "Per council schedule": { bg: "#F0F9FF", text: "#0369A1" },
      "Weekly (summer)":      { bg: "#EFF6FF", text: "#1D4ED8" },
    };

    const FreqBadge = ({ freq }) => {
      const key = Object.keys(freqColors).find(k => freq.startsWith(k)) || "";
      const c = freqColors[key] || { bg: "#F3F4F6", text: "#374151" };
      return (
        <span style={{ background: c.bg, color: c.text, fontSize: "10px", fontWeight: 700, letterSpacing: "0.05em", padding: "2px 8px", borderRadius: "20px", textTransform: "uppercase", whiteSpace: "nowrap", flexShrink: 0 }}>{freq}</span>
      );
    };

    // ── Per-person checkbox ──
    // checked  = this person has ticked this task
    // greyed   = the OTHER person has ticked this task, so this one is locked out
    const PersonCheck = ({ checked, greyed, onClick, accent, dark }) => {
      const baseCircle = dark ? "#334155" : "#E5E7EB";
      if (greyed) {
        return (
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
            style={{ cursor: "not-allowed", opacity: 0.3, display: "block" }}>
            <circle cx="12" cy="12" r="12" fill={baseCircle} />
          </svg>
        );
      }
      return (
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
          onClick={onClick}
          style={{ cursor: "pointer", display: "block", transition: "opacity 0.15s" }}>
          <circle cx="12" cy="12" r="12" fill={checked ? accent : baseCircle} />
          {checked && <path d="M7 12.5L10.5 16L17 9" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" />}
        </svg>
      );
    };

    function App() {
      const [activeCat, setActiveCat] = useState(0);
      const [activeTab, setActiveTab] = useState("tasks");
      const [animating, setAnimating]  = useState(false);

      // completed[taskId] = "graeme" | "emily" | null
      // A task is done when either person checks it; checking it again unchecks it.
      const [completed, setCompleted] = useState(() => {
        try { return JSON.parse(localStorage.getItem("dp_completed") || "{}"); } catch { return {}; }
      });
      const [log, setLog] = useState(() => {
        try { return JSON.parse(localStorage.getItem("dp_log") || "[]"); } catch { return []; }
      });
      const [notes, setNotes] = useState(() => {
        try { return JSON.parse(localStorage.getItem("dp_notes") || "{}"); } catch { return {}; }
      });
      const [darkMode, setDarkMode] = useState(() => {
        try { return localStorage.getItem("dp_dark") === "true"; } catch { return false; }
      });

      const [logInput, setLogInput] = useState({ task: "", action: "", outcome: "" });

      useEffect(() => { localStorage.setItem("dp_completed", JSON.stringify(completed)); }, [completed]);
      useEffect(() => { localStorage.setItem("dp_log",       JSON.stringify(log));       }, [log]);
      useEffect(() => { localStorage.setItem("dp_notes",     JSON.stringify(notes));     }, [notes]);
      useEffect(() => { localStorage.setItem("dp_dark",      darkMode);                  }, [darkMode]);

      // Toggle: clicking your own checked box unchecks; clicking when other person owns it → no-op
      const toggleComplete = (id, person) => {
        setCompleted(prev => {
          const current = prev[id];
          if (current === person) return { ...prev, [id]: null };   // uncheck
          if (current && current !== person) return prev;            // locked — other person owns it
          return { ...prev, [id]: person };                          // check
        });
      };

      const season     = getSeason();
      const todayName  = getTodayName();
      const todaySched = weeklySchedule.find(s => s.day === todayName);

      const allTasks  = categories.flatMap(c => c.tasks);
      const totalDone = allTasks.filter(t => isDone(completed, t.id)).length;
      const progress  = Math.round((totalDone / allTasks.length) * 100);

      const cat     = categories[activeCat];
      const catDone = cat.tasks.filter(t => isDone(completed, t.id)).length;

      // ── Theme tokens ──
      const dk = darkMode;
      const t = {
        pageBg:     dk ? "#0F172A" : "#F8FAFC",
        header:     dk ? "#080D14" : "#1E293B",
        card:       dk ? "#1E293B" : "white",
        cardShadow: dk ? "0 1px 3px rgba(0,0,0,0.4)" : "0 1px 3px rgba(0,0,0,0.06)",
        border:     dk ? "#334155" : "#E5E7EB",
        text:       dk ? "#E2E8F0" : "#1E293B",
        textMuted:  dk ? "#CBD5E1" : "#374151",
        textMuted2: dk ? "#94A3B8" : "#4B5563",
        label:      dk ? "#64748B" : "#9CA3AF",
        tabInactive:dk ? "#94A3B8" : "#6B7280",
        rowBg:      dk ? "#0F172A" : "#F8FAFC",
        catCardBg:  dk ? `${cat.accent}18` : cat.color,
        doneBg:     dk ? "#052e16" : "#F0FDF4",
        doneBorder: dk ? "#166534" : "#BBF7D0",
        doneText:   dk ? "#4ade80" : "#166534",
        sidebarBtn: (c, active) => active ? (dk ? `${c.accent}18` : c.color) : (dk ? "#1E293B" : "white"),
      };

      const switchCat = (idx) => {
        if (idx === activeCat) return;
        setAnimating(true);
        setTimeout(() => { setActiveCat(idx); setActiveTab("tasks"); setAnimating(false); }, 180);
      };

      const addLogEntry = () => {
        if (!logInput.task.trim()) return;
        const entry = {
          id: Date.now(),
          date: new Date().toLocaleDateString("en-AU", { year: "numeric", month: "2-digit", day: "2-digit" }),
          ...logInput,
        };
        setLog(prev => [entry, ...prev]);
        setLogInput({ task: "", action: "", outcome: "" });
      };

      // Column width for Graeme / Emily checkbox columns
      const personColW = 68;

      return (
        <div style={{ minHeight: "100vh", background: t.pageBg, color: t.text, transition: "background 0.2s ease, color 0.2s ease" }}>

          {/* ── Header ── */}
          <div className="app-header" style={{ background: t.header, color: "white" }}>
            <div className="header-inner">
              <div className="header-top">
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontSize: 11, letterSpacing: "0.15em", textTransform: "uppercase", color: "#94A3B8", marginBottom: 4 }}>Perth, Western Australia</div>
                  <h1 className="site-title">Domestic Planner</h1>
                  <p style={{ marginTop: 4, fontSize: 13, color: "#94A3B8" }}>
                    {seasonInfo[season].icon} {seasonInfo[season].label} · {todayName} · {seasonInfo[season].tip}
                  </p>
                </div>
                <button className="dark-btn" onClick={() => setDarkMode(d => !d)}>
                  {dk ? "☀ Light" : "☾ Dark"}
                </button>
              </div>

              {todaySched && (
                <div style={{ marginBottom: 12, padding: "10px 14px", borderRadius: 10, background: "rgba(255,255,255,0.07)", fontSize: 13, color: "#CBD5E1" }}>
                  <span style={{ color: "#94A3B8", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginRight: 8 }}>Today</span>
                  {todaySched.tasks.join(" · ")}
                </div>
              )}

              <div className="progress-row">
                <span>{totalDone} of {allTasks.length} tasks marked complete</span>
                <span>{progress}%</span>
              </div>
              <div className="progress-bar">
                <div className="progress-fill" style={{ width: `${progress}%` }} />
              </div>
            </div>
          </div>

          {/* ── Body grid ── */}
          <div className="body-grid" style={{ background: t.pageBg }}>

            {/* ── Sidebar ── */}
            <div className="sidebar">

              {/* Mobile: horizontal scrollable pill strip */}
              <div className="step-strip">
                {categories.map((c, i) => {
                  const done = c.tasks.filter(task => isDone(completed, task.id)).length;
                  const isActive = i === activeCat;
                  return (
                    <button key={c.id} className="step-pill"
                      onClick={() => switchCat(i)}
                      style={{ background: t.sidebarBtn(c, isActive), borderTop: isActive ? `3px solid ${c.accent}` : "3px solid transparent", boxShadow: isActive ? `0 2px 10px ${c.accent}33` : t.cardShadow }}>
                      <div style={{ fontSize: 20, marginBottom: 4 }}>{c.icon}</div>
                      <div style={{ fontSize: 11, fontWeight: 700, color: isActive ? c.accent : t.textMuted, lineHeight: 1.3 }}>{c.title}</div>
                      <div style={{ fontSize: 10, color: t.label, marginTop: 2 }}>{done}/{c.tasks.length}</div>
                    </button>
                  );
                })}
              </div>

              {/* Desktop: vertical list */}
              <div className="sidebar-list">
                {categories.map((c, i) => {
                  const done = c.tasks.filter(task => isDone(completed, task.id)).length;
                  const isActive = i === activeCat;
                  return (
                    <button key={c.id} className="sidebar-btn"
                      onClick={() => switchCat(i)}
                      style={{ background: t.sidebarBtn(c, isActive), borderLeft: isActive ? `3px solid ${c.accent}` : "3px solid transparent", boxShadow: isActive ? `0 2px 12px ${c.accent}22` : t.cardShadow }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
                        <span style={{ fontSize: 18 }}>{c.icon}</span>
                        <span style={{ fontSize: 13, fontWeight: 700, color: isActive ? c.accent : t.textMuted }}>{c.title}</span>
                      </div>
                      <div style={{ fontSize: 11, color: t.label, marginLeft: 26 }}>{done} of {c.tasks.length} complete</div>
                      <div style={{ marginLeft: 26, marginTop: 5, height: 3, borderRadius: 2, background: t.border, overflow: "hidden" }}>
                        <div style={{ height: "100%", borderRadius: 2, background: c.accent, width: `${Math.round((done / c.tasks.length) * 100)}%`, transition: "width 0.4s ease" }} />
                      </div>
                    </button>
                  );
                })}

                {/* Season info card */}
                <div className="card" style={{ marginTop: 16, background: t.card, boxShadow: t.cardShadow }}>
                  <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: t.label, marginBottom: 10 }}>Perth Seasons</div>
                  {Object.entries(seasonInfo).map(([key, s]) => (
                    <div key={key} style={{ fontSize: 12, padding: "5px 0", borderBottom: `1px solid ${t.border}`, color: key === season ? cat.accent : t.textMuted, fontWeight: key === season ? 700 : 400 }}>
                      {s.icon} {s.label} <span style={{ color: t.label, fontWeight: 400 }}>({s.months})</span>
                      {key === season && <div style={{ fontSize: 11, color: t.label, fontWeight: 400, marginTop: 3, lineHeight: 1.4 }}>{s.tip}</div>}
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* ── Main content ── */}
            <div className="main-col" style={{ opacity: animating ? 0 : 1, transform: animating ? "translateY(8px)" : "translateY(0)", transition: "opacity 0.18s ease, transform 0.18s ease" }}>

              {/* Category hero */}
              <div className="step-hero" style={{ background: t.catCardBg, borderLeft: `5px solid ${cat.accent}`, boxShadow: `0 4px 20px ${cat.accent}18` }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
                  <span style={{ fontSize: 30 }}>{cat.icon}</span>
                  <div>
                    <div style={{ fontSize: 11, color: cat.accent, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase" }}>{catDone} of {cat.tasks.length} complete</div>
                    <h2 style={{ margin: 0, fontSize: 20, fontWeight: 700, color: t.text }}>{cat.title}</h2>
                  </div>
                </div>
                <div style={{ height: 6, borderRadius: 3, background: "rgba(0,0,0,0.08)", overflow: "hidden" }}>
                  <div style={{ height: "100%", borderRadius: 3, background: cat.accent, width: `${Math.round((catDone / cat.tasks.length) * 100)}%`, transition: "width 0.4s ease" }} />
                </div>
              </div>

              {/* Tab bar */}
              <div className="tab-bar" style={{ background: t.card, boxShadow: t.cardShadow }}>
                {["tasks", "schedule", "log", "notes"].map(tab => (
                  <button key={tab} className="tab-btn" onClick={() => setActiveTab(tab)}
                    style={{ background: activeTab === tab ? cat.accent : "transparent", color: activeTab === tab ? "white" : t.tabInactive }}>
                    {tab}
                    {tab === "notes" && notes[cat.id] && activeTab !== "notes" && (
                      <span style={{ position: "absolute", top: 7, right: 7, width: 6, height: 6, borderRadius: "50%", background: cat.accent }} />
                    )}
                    {tab === "log" && log.length > 0 && activeTab !== "log" && (
                      <span style={{ position: "absolute", top: 7, right: 7, width: 6, height: 6, borderRadius: "50%", background: cat.accent }} />
                    )}
                  </button>
                ))}
              </div>

              {/* ── Tasks tab ── */}
              {activeTab === "tasks" && (
                <div className="card" style={{ background: t.card, boxShadow: t.cardShadow }}>

                  {/* Column header row */}
                  <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "0 14px 10px", borderBottom: `1px solid ${t.border}`, marginBottom: 10 }}>
                    <div style={{ flex: 1, fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: t.label }}>
                      {cat.title} Tasks
                    </div>
                    <div className="person-col person-label" style={{ width: personColW, textAlign: "center", fontSize: 11, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", color: t.label }}>
                      Graeme
                    </div>
                    <div className="person-col person-label" style={{ width: personColW, textAlign: "center", fontSize: 11, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", color: t.label }}>
                      Emily
                    </div>
                  </div>

                  {/* Task rows */}
                  <div style={{ display: "grid", gap: 8 }}>
                    {cat.tasks.map(task => {
                      const who  = completed[task.id];   // "graeme" | "emily" | null/undefined
                      const done = isDone(completed, task.id);
                      return (
                        <div key={task.id} className="row-item"
                          style={{ background: done ? t.doneBg : t.rowBg, border: `1px solid ${done ? t.doneBorder : t.border}`, transition: "all 0.2s", alignItems: "center", gap: 12 }}>

                          {/* Task info */}
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 4 }}>
                              <span style={{ fontSize: 14, fontWeight: 600, color: done ? t.doneText : t.text }}>{task.name}</span>
                              <FreqBadge freq={task.freq} />
                            </div>
                            <div style={{ fontSize: 12, color: t.label, lineHeight: 1.4 }}>{task.notes}</div>
                          </div>

                          {/* Graeme checkbox */}
                          <div className="person-col" style={{ width: personColW, display: "flex", justifyContent: "center", flexShrink: 0 }}>
                            <PersonCheck
                              checked={who === "graeme"}
                              greyed={who === "emily"}
                              onClick={() => toggleComplete(task.id, "graeme")}
                              accent={cat.accent}
                              dark={dk}
                            />
                          </div>

                          {/* Emily checkbox */}
                          <div className="person-col" style={{ width: personColW, display: "flex", justifyContent: "center", flexShrink: 0 }}>
                            <PersonCheck
                              checked={who === "emily"}
                              greyed={who === "graeme"}
                              onClick={() => toggleComplete(task.id, "emily")}
                              accent={cat.accent}
                              dark={dk}
                            />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* ── Schedule tab ── */}
              {activeTab === "schedule" && (
                <div style={{ display: "grid", gap: 10 }}>
                  {weeklySchedule.map(s => {
                    const isToday = s.day === todayName;
                    return (
                      <div key={s.day} className="row-item"
                        style={{ background: isToday ? (dk ? `${cat.accent}18` : cat.color) : t.rowBg, border: `1px solid ${isToday ? cat.accent : t.border}`, borderLeft: isToday ? `4px solid ${cat.accent}` : `1px solid ${t.border}` }}>
                        <div style={{ minWidth: 96 }}>
                          <div style={{ fontSize: 13, fontWeight: 700, color: isToday ? cat.accent : t.textMuted }}>{s.day}</div>
                          {isToday && <div style={{ fontSize: 10, color: cat.accent, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em" }}>Today</div>}
                        </div>
                        <div style={{ flex: 1 }}>
                          {s.tasks.map((task, i) => (
                            <div key={i} style={{ fontSize: 13, color: t.textMuted2, padding: "2px 0" }}>· {task}</div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* ── Log tab ── */}
              {activeTab === "log" && (
                <div style={{ display: "grid", gap: 12 }}>
                  <div className="card" style={{ background: t.card, boxShadow: t.cardShadow }}>
                    <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: t.label, marginBottom: 14 }}>Add Log Entry</div>
                    <div style={{ display: "grid", gap: 10 }}>
                      <input
                        value={logInput.task}
                        onChange={e => setLogInput(p => ({ ...p, task: e.target.value }))}
                        placeholder="Task name"
                        style={{ width: "100%", padding: "10px 12px", borderRadius: 8, border: `1px solid ${t.border}`, fontSize: 14, fontFamily: "Calibri, sans-serif", color: t.text, background: t.rowBg, outline: "none", boxSizing: "border-box" }}
                      />
                      <input
                        value={logInput.action}
                        onChange={e => setLogInput(p => ({ ...p, action: e.target.value }))}
                        placeholder="What was done?"
                        style={{ width: "100%", padding: "10px 12px", borderRadius: 8, border: `1px solid ${t.border}`, fontSize: 14, fontFamily: "Calibri, sans-serif", color: t.text, background: t.rowBg, outline: "none", boxSizing: "border-box" }}
                      />
                      <input
                        value={logInput.outcome}
                        onChange={e => setLogInput(p => ({ ...p, outcome: e.target.value }))}
                        placeholder="Outcome / notes"
                        style={{ width: "100%", padding: "10px 12px", borderRadius: 8, border: `1px solid ${t.border}`, fontSize: 14, fontFamily: "Calibri, sans-serif", color: t.text, background: t.rowBg, outline: "none", boxSizing: "border-box" }}
                      />
                      <button onClick={addLogEntry}
                        style={{ padding: "12px", borderRadius: 8, border: "none", background: cat.accent, color: "white", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "Calibri, sans-serif" }}>
                        + Add Entry
                      </button>
                    </div>
                  </div>

                  {log.length === 0 ? (
                    <div className="card" style={{ background: t.card, boxShadow: t.cardShadow, textAlign: "center", color: t.label, fontSize: 14, padding: 32 }}>
                      No log entries yet. Add your first one above.
                    </div>
                  ) : (
                    <div className="card" style={{ background: t.card, boxShadow: t.cardShadow }}>
                      <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: t.label, marginBottom: 14 }}>History ({log.length} {log.length === 1 ? "entry" : "entries"})</div>
                      <div style={{ display: "grid", gap: 10 }}>
                        {log.map(entry => (
                          <div key={entry.id} className="row-item" style={{ background: t.rowBg, border: `1px solid ${t.border}`, flexDirection: "column", gap: 4, alignItems: "flex-start" }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", width: "100%" }}>
                              <span style={{ fontSize: 13, fontWeight: 700, color: t.text }}>{entry.task}</span>
                              <span style={{ fontSize: 11, color: t.label }}>{entry.date}</span>
                            </div>
                            {entry.action  && <div style={{ fontSize: 12, color: t.textMuted2 }}>Action: {entry.action}</div>}
                            {entry.outcome && <div style={{ fontSize: 12, color: t.textMuted2 }}>Outcome: {entry.outcome}</div>}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* ── Notes tab ── */}
              {activeTab === "notes" && (
                <div className="card" style={{ background: t.card, boxShadow: t.cardShadow }}>
                  <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: t.label, marginBottom: 14 }}>Notes — {cat.title}</div>
                  <textarea
                    value={notes[cat.id] || ""}
                    onChange={e => setNotes(prev => ({ ...prev, [cat.id]: e.target.value }))}
                    placeholder="Write anything useful for this category — products you use, issues you've noticed, routines that work..."
                    style={{ width: "100%", minHeight: 180, padding: "14px 16px", borderRadius: 8, border: `1px solid ${t.border}`, fontSize: 15, lineHeight: 1.7, fontFamily: "Calibri, sans-serif", color: t.textMuted, background: t.rowBg, resize: "vertical", outline: "none", boxSizing: "border-box" }}
                    onFocus={e => e.target.style.borderColor = cat.accent}
                    onBlur={e => e.target.style.borderColor = t.border}
                  />
                  {notes[cat.id] && (
                    <div style={{ marginTop: 8, fontSize: 12, color: t.label, textAlign: "right" }}>
                      {notes[cat.id].length} characters · saved automatically
                    </div>
                  )}
                </div>
              )}

            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
